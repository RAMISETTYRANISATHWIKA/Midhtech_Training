<!DOCTYPE html>
<html>
<head>
    <title>MidhTech - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="https://midhtech.com/storage/settings/midh-logo-01.png"
             alt="MidhTech Logo"
             width="150"
             align="right">

        <center>
            <h1 id="company">MIDH TECHNOLOGIES</h1><br>
            <hr>
        </center>
    </header>
    <center>
        <h2 class="login">Login Page</h2>
        <form action="index.html">
            <label>Username:</label><br>
            <input type="text" placeholder="Enter Username">
            <br><br>
            <label>Password:</label><br>
            <input type="password" placeholder="Enter Password">
            <br><br>
            <input type="submit" value="Login" class="login-button">
            <input type="reset" value="Clear" class="clear-button">
        </form>
        <hr>
        <footer>
            <p>© 2026 MidhTech. All Rights Reserved.</p>
        </footer>
    </center>

</body>
</html>
